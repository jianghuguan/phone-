<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小手机自适应版</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="status-bar" v-bind:class="{ 'dark-text': !store.currentApp }">
            <span class="time">{{ time }}</span>
            <div class="dynamic-island"></div>
            <div class="battery">
                <span class="battery-text">{{ battery }}%</span>
                <div class="battery-icon">
                    <div class="battery-level" v-bind:style="{ width: battery + '%' }"></div>
                </div>
            </div>
        </div>

        <div class="desktop-bg-layer" v-bind:class="{ 'desktop-opened-bg': store.currentApp }" v-bind:style="{ backgroundImage: store.desktopBgImage ? 'url(' + store.desktopBgImage + ')' : 'none' }"></div>

        <div id="desktop-swiper" class="desktop-swiper" v-bind:class="{ 'desktop-opened-swiper': store.currentApp }">
            <div v-for="(pageItems, pageIdx) in store.desktopPages" v-bind:key="pageIdx" v-bind:id="'desktop-page-' + pageIdx" class="desktop-page">
                <div v-for="item in pageItems" v-bind:key="item.id" v-bind:class="getItemClass(item)" v-bind:style="getWidgetStyle(item)" v-on:click="handleItemClick(item, $event)" v-bind:data-id="item.id">
                    
                    <div v-if="item.type === 'empty'" class="empty-slot"></div>

                    <div v-else-if="item.widgetType === 'time'" class="widget-time" v-bind:style="{ backgroundColor: 'transparent', backgroundImage: item.bgImage ? 'url(' + item.bgImage + ')' : 'none', color: item.bgImage ? '#fff' : '#333' }">
                        <div class="time-header">
                            <h1>{{ time }}</h1>
                            <div class="weather-info">
                                <span class="temp">{{ temperature }}</span>
                                <span class="desc">{{ weatherDesc }}</span>
                            </div>
                        </div>
                        <p class="date-text" v-bind:style="{ color: item.bgImage ? '#eee' : '#555' }">{{ date }} {{ weekday }}</p>
                    </div>

                    <div v-else-if="item.widgetType === 'photo' || item.widgetType === 'photo_1x2' || item.widgetType === 'photo_2x1'" class="widget-photo" v-bind:style="{ backgroundImage: item.bgImage ? 'url(' + item.bgImage + ')' : 'none' }">
                        <span v-if="!item.bgImage" style="color:#aaa; font-size:12px;">设置</span>
                    </div>

                    <div v-else-if="item.widgetType === 'photo_1x1_circle'" class="widget-photo photo-circle" v-bind:style="{ backgroundImage: item.bgImage ? 'url(' + item.bgImage + ')' : 'none' }">
                        <span v-if="!item.bgImage" style="color:#aaa; font-size:10px;">设置</span>
                    </div>

                    <div v-else-if="item.widgetType === 'dialog_2x2'" class="transparent-widget">
                        <div class="dialog-inner">
                            <div class="dialog-avatar" v-bind:style="{ backgroundImage: item.bgImage ? 'url(' + item.bgImage + ')' : 'none' }">
                                <span v-if="!item.bgImage" style="font-size:10px; color:#999; display:flex; height:100%; align-items:center; justify-content:center;">头像</span>
                            </div>
                            <div class="dialog-bubble" v-on:mousedown.stop v-on:touchstart.stop>
                                <textarea v-model="item.text" placeholder="输入文字..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div v-else-if="item.type === 'app'" style="display: contents;">
                        <div class="icon-img" v-bind:style="{ backgroundColor: item.color, backgroundImage: item.iconImage ? 'url(' + item.iconImage + ')' : 'none' }">
                            <span v-if="!item.iconImage" style="display:contents;">{{ item.textIcon }}</span>
                        </div>
                        <span class="icon-name">{{ item.name }}</span>
                    </div>

                </div>
            </div>
        </div>

        <transition name="app-slide">
            <div v-show="store.currentApp" class="app-view">
                <component v-bind:is="store.currentApp" v-if="store.currentApp"></component>
                <div class="home-indicator-wrapper" v-on:touchstart="homeTouchStart" v-on:touchmove="homeTouchMove" v-on:touchend="homeTouchEnd">
                    <div class="home-indicator"></div>
                </div>
            </div>
        </transition>
    </div>

    <script src="./js/store.js"></script>
    <script src="./js/apps/widgetApp.js"></script>
    <script src="./js/apps/theme.js"></script>
    <script src="./js/apps/settings.js"></script>
    <script src="./js/apps/qq.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
