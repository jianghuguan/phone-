<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小手机自适应版</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- class 和 style 已经全部从 HTML 中抽离并由 main.js 承接 -->
        <div :class="getStatusBarClass()">
            <span class="time">{{ time }}</span>
            <div class="dynamic-island"></div>
            <div class="battery">
                <span class="battery-text">{{ battery }}%</span>
                <div class="battery-icon">
                    <div class="battery-level" :style="getBatteryStyle()"></div>
                </div>
            </div>
        </div>

        <div id="desktop-grid" :class="getDesktopClass()" :style="getDesktopStyle()">
            <div v-for="item in store.desktopItems" :key="item.id" :class="getItemClass(item)" :style="getWidgetStyle(item)" @click="handleItemClick(item, $event)">
                
                <div v-if="item.widgetType === 'time'" class="widget-time" :style="getWidgetTimeStyle(item)">
                    <div class="time-header">
                        <h1>{{ time }}</h1>
                        <div class="weather-info">
                            <span class="temp">{{ temperature }}</span>
                            <span class="desc">{{ weatherDesc }}</span>
                        </div>
                    </div>
                    <p class="date-text" :style="getDateTextStyle(item)">{{ date }} {{ weekday }}</p>
                </div>

                <div v-else-if="item.widgetType === 'photo'" class="widget-photo" :style="getWidgetPhotoStyle(item)">
                    <span v-if="!item.bgImage" style="color:#aaa; font-size:12px;">设置</span>
                </div>

                <div v-else-if="item.widgetType === 'photo_1x1_circle'" class="widget-photo photo-circle" :style="getWidgetPhotoStyle(item)">
                    <span v-if="!item.bgImage" style="color:#aaa; font-size:10px;">设置</span>
                </div>

                <div v-else-if="item.widgetType === 'photo_1x2'" class="widget-photo" :style="getWidgetPhotoStyle(item)">
                    <span v-if="!item.bgImage" style="color:#aaa; font-size:12px;">设置</span>
                </div>

                <div v-else-if="item.widgetType === 'photo_2x1'" class="widget-photo" :style="getWidgetPhotoStyle(item)">
                    <span v-if="!item.bgImage" style="color:#aaa; font-size:12px;">设置</span>
                </div>

                <div v-else-if="item.type === 'app'" style="display: contents;">
                    <div class="icon-img" :style="getAppIconStyle(item)">
                        <span v-if="!item.iconImage" style="display:contents;">{{ item.textIcon }}</span>
                    </div>
                    <span class="icon-name">{{ item.name }}</span>
                </div>

            </div>
        </div>

        <transition name="app-slide">
            <div v-show="store.currentApp" class="app-view">
                <component :is="store.currentApp" v-if="store.currentApp"></component>
                <div class="home-indicator-wrapper" @touchstart="homeTouchStart" @touchmove="homeTouchMove" @touchend="homeTouchEnd">
                    <div class="home-indicator"></div>
                </div>
            </div>
        </transition>
    </div>

    <script src="./js/store.js"></script>
    <script src="./js/apps/widgetApp.js"></script>
    <script src="./js/apps/theme.js"></script>
    <script src="./js/apps/settings.js"></script>
    <script src="./js/apps/qq.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
