<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小手机自适应版</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="status-bar" :class="{ 'dark-text': !store.currentApp }">
            <span class="time">{{ time }}</span>
            <div class="dynamic-island"></div>
            <div class="battery">
                <span class="battery-text">{{ battery }}%</span>
                <div class="battery-icon">
                    <div class="battery-level" :style="{ width: battery + '%' }"></div>
                </div>
            </div>
        </div>

        <div v-show="!store.currentApp" class="desktop" id="desktop-grid">
            <div v-for="item in store.desktopItems" :key="item.id" 
                 :class="{'widget-box': item.type === 'widget', 'app-icon': item.type === 'app'}"
                 :style="item.type === 'widget' ? { gridColumn: 'span ' + item.span.split('/')[0].trim(), gridRow: 'span ' + item.span.split('/')[1].trim() } : {}"
                 @click="item.type === 'app' ? openApp(item.id) : null">
                
                <div v-if="item.widgetType === 'time'" class="widget-time" 
                     :style="{ backgroundColor: 'transparent', backgroundImage: item.bgImage ? 'url(' + item.bgImage + ')' : 'none', color: item.bgImage ? '#fff' : '#333' }">
                    <div class="time-header">
                        <h1>{{ time }}</h1>
                        <div class="weather-info">
                            <span class="temp">{{ temperature }}</span>
                            <span class="desc">{{ weatherDesc }}</span>
                        </div>
                    </div>
                    <p class="date-text" :style="{ color: item.bgImage ? '#eee' : '#555' }">{{ date }} {{ weekday }}</p>
                </div>

                <div v-else-if="item.widgetType === 'photo'" class="widget-photo"
                     :style="{ backgroundImage: item.bgImage ? 'url(' + item.bgImage + ')' : 'none' }">
                    <span v-if="!item.bgImage" style="color:#aaa; font-size:12px;">去小组件App设置图片</span>
                </div>

                <div v-else-if="item.type === 'app'" style="display: contents;">
                    <div class="icon-img" :style="{ backgroundColor: item.color, backgroundImage: item.iconImage ? 'url(' + item.iconImage + ')' : 'none' }">
                        <template v-if="!item.iconImage">{{ item.textIcon }}</template>
                    </div>
                    <span class="icon-name">{{ item.name }}</span>
                </div>
            </div>
        </div>

        <div v-show="store.currentApp" class="app-view">
            <component :is="store.currentApp"></component>
            <div class="home-indicator" @click="closeApp"></div>
        </div>
    </div>

    <script src="./js/store.js"></script>
    <script src="./js/apps/widgetApp.js"></script>
    <script src="./js/apps/theme.js"></script>
    <script src="./js/apps/weibo.js"></script>
    <script src="./js/apps/settings.js"></script>
    <script src="./js/apps/qq.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
