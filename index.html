<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小手机自适应版</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- 引入 Vue3 和 Sortable 滑动库 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- 状态栏 & 灵动岛 -->
        <div class="status-bar" :class="{ 'dark-text': !store.currentApp }">
            <span class="time">{{ time }}</span>
            <div class="dynamic-island"></div>
            <span class="battery">
                <span class="battery-text">{{ battery }}%</span>
                <div class="battery-icon">
                    <div class="battery-level" :style="{ width: battery + '%' }"></div>
                </div>
            </span>
        </div>

        <!-- 桌面网格系统 (统一渲染拖放数组) -->
        <div v-show="!store.currentApp" class="desktop" id="desktopGrid">
            <div v-for="item in store.desktopLayout" :key="item.id" class="desktop-item"
                 :style="item.isWidget ? { gridColumn: 'span ' + item.span.split('/')[0].trim(), gridRow: 'span ' + item.span.split('/')[1].trim() } : { gridColumn: 'span 1', gridRow: 'span 1' }">

                <!-- 1. 新的时间天气联合小组件 -->
                <div v-if="item.id === 'timeWidget'" class="widget-time-weather" 
                     :style="{ backgroundImage: store.widgetSettings.timeBg ? 'url(' + store.widgetSettings.timeBg + ')' : 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)' }">
                    <div class="widget-content time-part">
                        <h1>{{ time }}</h1>
                        <p>{{ date }} {{ weekday }}</p>
                    </div>
                    <div class="widget-content weather-part">
                        <h2>{{ weather.icon }} {{ weather.temp }}°C</h2>
                        <p>{{ weather.desc }}</p>
                    </div>
                </div>

                <!-- 2. 照片墙小组件 -->
                <div v-else-if="item.id === 'photoWidget'" class="widget-photo" 
                     :style="{ backgroundImage: 'url(' + store.widgetSettings.photoBg + ')' }">
                </div>

                <!-- 3. App 图标 -->
                <div v-else-if="item.isApp" class="app-icon" @click="openApp(item.id)">
                    <div class="icon-img" :style="{ backgroundColor: item.color }">{{ item.textIcon }}</div>
                    <span class="icon-name">{{ item.name }}</span>
                </div>

            </div>
        </div>

        <!-- App 运行界面 -->
        <div v-if="store.currentApp" class="app-view">
            <component :is="store.currentApp"></component>
            <!-- 底部返回横条 -->
            <div class="home-indicator" @click="closeApp"></div>
        </div>
    </div>

    <!-- 加载逻辑顺序 -->
    <script src="/js/store.js"></script>
    <script src="/js/apps/widgetApp.js"></script>
    <script src="/js/apps/weibo.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
